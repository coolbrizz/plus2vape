<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable | +2 VAPE</title>
    <style>
        /* Import d'une police moderne */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');

        :root {
            --bg-color: #0f1115; /* Fond sombre moderne */
            --text-main: #f3f4f6; /* Texte clair */
            --text-muted: #9ca3af; /* Texte gris/secondaire */
            --accent: #10b981; /* Vert CBD / Accentuation */
            --accent-hover: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden; /* Empêche le scroll si on ajoute des animations */
            position: relative;
        }

        /* Effet de vapeur subtil en fond */
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, rgba(15, 17, 21, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            z-index: 1;
        }

        /* Logo textuel */
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 3rem;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent);
        }

        /* L'erreur 404 */
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* Animation "nuage" sur le texte 404 */
        .error-code::after {
            content: '404';
            position: absolute;
            left: 0;
            top: 0;
            color: var(--accent);
            filter: blur(15px);
            opacity: 0.3;
            z-index: -1;
            animation: pulse-smoke 4s infinite alternate;
        }

        @keyframes pulse-smoke {
            0% { filter: blur(15px); opacity: 0.2; transform: scale(0.98); }
            100% { filter: blur(25px); opacity: 0.5; transform: scale(1.05); }
        }

        .error-title {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .error-desc {
            font-size: 1.125rem;
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Bouton de retour */
        .btn-home {
            display: inline-block;
            background-color: var(--accent);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .btn-home:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }

        .footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            z-index: 1;
        }

        /* Responsive design pour mobile */
        @media (max-width: 600px) {
            .error-code { font-size: 6rem; }
            .error-title { font-size: 1.5rem; }
            .error-desc { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="container">
        <a href="/" class="logo">+2 <span>VAPE</span></a>
        
        <div class="error-code">404</div>
        
        <h1 class="error-title">Cette page s'est évaporée...</h1>
        <p class="error-desc">
            Oups ! Le lien que vous cherchez semble s'être dissipé dans un nuage de vapeur. 
            Pas d'inquiétude, notre boutique a toujours ce qu'il vous faut pour votre e-cigarette et vos produits CBD.
        </p>
        
        <a href="/" class="btn-home">Retour à l'accueil</a>
    </div>

    <footer class="footer">
        © 2026 +2VAPE · Vape Shop Les Pennes Mirabeau
    </footer>
</body>
</html>
